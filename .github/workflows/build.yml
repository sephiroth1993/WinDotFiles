name: Compilar PS1 a EXE

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Convertir PNG a ICO
        shell: pwsh
        run: |
          $url = "https://www.imagemagick.org/archive/binaries/ImageMagick-7.1.1-47-Q16-HDRI-x64-dll.exe"
          Invoke-WebRequest -Uri $url -OutFile "imagemagick_installer.exe"
          Start-Process -FilePath "imagemagick_installer.exe" -ArgumentList "/SILENT" -Wait
          & "C:\Program Files\ImageMagick-7.1.1-Q16-HDRI\magick.exe" "FFRK_Sephiroth_Sprite.png" -resize 256x256 "icon.ico"

      - name: Instalar ps2exe
        shell: pwsh
        run: |
          Install-Module -Name ps2exe -Force -Scope CurrentUser

      - name: Compilar PS1 a EXE
        shell: pwsh
        run: |
          Invoke-ps2exe `
            -inputFile "instalar_apps.ps1" `
            -outputFile "instalar_apps.exe" `
            -requireAdmin `
            -iconFile "icon.ico" `
            -title "Instalador de Apps" `
            -description "Script de instalacion automatica con Winget" `
            -version "1.0.0"

      - name: Subir EXE como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: instalar_apps
          path: instalar_apps.exe
