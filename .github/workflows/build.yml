name: Compilar PS1 a EXE

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Instalar ps2exe
        shell: pwsh
        run: |
          Install-Module -Name ps2exe -Force -Scope CurrentUser

      - name: Obtener fecha para el tag
        shell: pwsh
        run: |
          $date = Get-Date -Format "yyyy.MM.dd.HHmm"
          echo "RELEASE_TAG=v$date" >> $env:GITHUB_ENV

      - name: Compilar PS1 a EXE
        shell: pwsh
        run: |
          Invoke-ps2exe `
            -inputFile "instalar_apps.ps1" `
            -outputFile "instalar_apps.exe" `
            -requireAdmin `
            -iconFile "Icon.ico" `
            -title "Instalador de Apps" `
            -description "Script de instalacion automatica con Winget" `
            -version "1.0.0"

      - name: Crear Release y subir EXE
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: "Instalador ${{ env.RELEASE_TAG }}"
          body: |
            Release generado automaticamente al hacer push a main.
          files: instalar_apps.exe
